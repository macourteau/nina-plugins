name: Auto Release

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check and tag changed plugins
        run: |
          declare -A PLUGIN_DIRS
          PLUGIN_DIRS[utilitypatterns]="UtilityPatterns"
          PLUGIN_DIRS[switchcommands]="SwitchCommands"
          PLUGIN_DIRS[triggers]="Triggers"

          for PREFIX in "${!PLUGIN_DIRS[@]}"; do
            DIR="${PLUGIN_DIRS[$PREFIX]}"

            # Skip if plugin directory doesn't exist
            if [ ! -d "$DIR" ]; then
              echo "$PREFIX: directory not found, skipping"
              continue
            fi

            # Skip if plugin has no solution file
            if ! ls "$DIR"/*.sln 1>/dev/null 2>&1; then
              echo "$PREFIX: no solution file found, skipping"
              continue
            fi

            # Find latest tag for this plugin
            LAST_TAG=$(git tag --sort=-v:refname -l "${PREFIX}/v*" | head -1)
            if [ -z "$LAST_TAG" ]; then
              LAST_TAG_REF="$(git rev-list --max-parents=0 HEAD)"
              LAST_VERSION="0.0.0"
            else
              LAST_TAG_REF="$LAST_TAG"
              LAST_VERSION="${LAST_TAG##*/v}"
            fi

            # Check for commits that touched this plugin's directory
            COMMIT_COUNT=$(git log "${LAST_TAG_REF}..HEAD" --oneline -- "$DIR/" | wc -l)
            if [ "$COMMIT_COUNT" -eq 0 ]; then
              echo "$PREFIX: no changes since ${LAST_TAG:-initial commit}"
              continue
            fi
            echo "$PREFIX: $COMMIT_COUNT commit(s) since ${LAST_TAG:-initial commit}"

            # Determine bump level from commit messages touching this directory
            BUMP="patch"
            MESSAGES=$(git log "${LAST_TAG_REF}..HEAD" --pretty=format:"%s" -- "$DIR/")

            if echo "$MESSAGES" | grep -qE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$MESSAGES" | grep -qE "^feat(\(.*\))?:"; then
              BUMP="minor"
            fi

            # Compute new version
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
            case $BUMP in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NEW_TAG="${PREFIX}/v${NEW_VERSION}"

            echo "$PREFIX: ${LAST_TAG:-v0.0.0} -> $NEW_TAG ($BUMP bump)"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            gh workflow run release.yml --ref "$NEW_TAG" -f tag="$NEW_TAG"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
