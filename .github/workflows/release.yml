name: Build and Release

on:
  push:
    tags:
      - 'utilitypatterns/v*'
      - 'switchcommands/v*'
      - 'triggers/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. triggers/v0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Parse tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          PREFIX="${TAG%%/v*}"
          VERSION="${TAG##*/v}"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          case "$PREFIX" in
            utilitypatterns)
              echo "sln=UtilityPatterns/UtilityPatterns.sln" >> "$GITHUB_OUTPUT"
              echo "dll=UtilityPatterns/UtilityPatterns/bin/Release/net8.0-windows/UtilityPatterns.dll" >> "$GITHUB_OUTPUT"
              echo "dir=UtilityPatterns" >> "$GITHUB_OUTPUT"
              echo "display_name=Utility Patterns" >> "$GITHUB_OUTPUT"
              ;;
            switchcommands)
              echo "sln=SwitchCommands/SwitchCommands.sln" >> "$GITHUB_OUTPUT"
              echo "dll=SwitchCommands/SwitchCommands/bin/Release/net8.0-windows/SwitchCommands.dll" >> "$GITHUB_OUTPUT"
              echo "dir=SwitchCommands" >> "$GITHUB_OUTPUT"
              echo "display_name=Switch Commands" >> "$GITHUB_OUTPUT"
              ;;
            triggers)
              echo "sln=Triggers/Triggers.sln" >> "$GITHUB_OUTPUT"
              echo "dll=Triggers/Triggers/bin/Release/net8.0-windows/Triggers.dll" >> "$GITHUB_OUTPUT"
              echo "dir=Triggers" >> "$GITHUB_OUTPUT"
              echo "display_name=Triggers" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown plugin prefix: $PREFIX"
              exit 1
              ;;
          esac

      - name: Build plugin
        run: |
          dotnet restore ${{ steps.tag.outputs.sln }}
          dotnet build ${{ steps.tag.outputs.sln }} -c Release --no-restore -p:Version=${{ steps.tag.outputs.version }}

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          CURRENT_TAG="${{ inputs.tag || github.ref_name }}"
          PREFIX="${{ steps.tag.outputs.prefix }}"
          DIR="${{ steps.tag.outputs.dir }}"

          PREV_TAG=$(git tag --sort=-v:refname -l "${PREFIX}/v*" | grep -v "^${CURRENT_TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURRENT_TAG}" -- "${DIR}/")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${CURRENT_TAG}" -- "${DIR}/")
          fi

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "${{ steps.tag.outputs.display_name }} v${{ steps.tag.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            ${{ steps.tag.outputs.dll }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
