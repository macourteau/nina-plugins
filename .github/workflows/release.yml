name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Restore (UtilityPatterns)
        run: dotnet restore UtilityPatterns/UtilityPatterns.sln

      - name: Build (UtilityPatterns)
        run: dotnet build UtilityPatterns/UtilityPatterns.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Restore (SwitchCommands)
        run: dotnet restore SwitchCommands/SwitchCommands.sln

      - name: Build (SwitchCommands)
        run: dotnet build SwitchCommands/SwitchCommands.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            UtilityPatterns/UtilityPatterns/bin/Release/net8.0-windows/UtilityPatterns.dll
            SwitchCommands/SwitchCommands/bin/Release/net8.0-windows/SwitchCommands.dll
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
