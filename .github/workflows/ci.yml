name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NINAUtilityPatterns/NINAUtilityPatterns.sln

      - name: Build
        run: dotnet build NINAUtilityPatterns/NINAUtilityPatterns.sln -c Release --no-restore
