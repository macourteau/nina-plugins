name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore (UtilityPatterns)
        run: dotnet restore UtilityPatterns/UtilityPatterns.sln

      - name: Build (UtilityPatterns)
        run: dotnet build UtilityPatterns/UtilityPatterns.sln -c Release --no-restore

      - name: Test (UtilityPatterns)
        run: dotnet test UtilityPatterns/UtilityPatterns.sln -c Release --no-build --verbosity normal

      - name: Restore (SwitchCommands)
        run: dotnet restore SwitchCommands/SwitchCommands.sln

      - name: Build (SwitchCommands)
        run: dotnet build SwitchCommands/SwitchCommands.sln -c Release --no-restore

      - name: Test (SwitchCommands)
        run: dotnet test SwitchCommands/SwitchCommands.sln -c Release --no-build --verbosity normal

      - name: Restore (Triggers)
        run: dotnet restore Triggers/Triggers.sln

      - name: Build (Triggers)
        run: dotnet build Triggers/Triggers.sln -c Release --no-restore

      - name: Test (Triggers)
        run: dotnet test Triggers/Triggers.sln -c Release --no-build --verbosity normal
